##################### Configuration of 'userdb' by group sharding v5 #######################

# External logical database schema.
schemaName: userdb_g0db0

# Default datasource configuration.
# @see:com.wl4g.component.integration.sharding.config.ProxyConfigurationLoader2#loadRuleConfiguration
defaultDataSource:
  username: root
  password: 123456
  connectionTimeoutMilliseconds: 30000
  idleTimeoutMilliseconds: 60000
  maxLifetimeMilliseconds: 1800000
  maxPoolSize: 50
  minPoolSize: 1

# Datasource configuration.
dataSources:
  ds_userdb_g0db0_0:
    url: 'jdbc:mysql://wl4g.debug:33061/userdb_g0db0?serverTimezone=UTC&useSSL=false&allowMultiQueries=true&characterEncoding=utf-8'
  ds_userdb_g0db0_1:
    url: 'jdbc:mysql://wl4g.debug:33062/userdb_g0db0?serverTimezone=UTC&useSSL=false&allowMultiQueries=true&characterEncoding=utf-8'
  ds_userdb_g0db0_2:
    url: 'jdbc:mysql://wl4g.debug:33063/userdb_g0db0?serverTimezone=UTC&useSSL=false&allowMultiQueries=true&characterEncoding=utf-8'

# Schema rules configuration.
rules:
 - !READWRITE_SPLITTING
  dataSources:
    ha_userdb_g0db0:
      writeDataSourceName: ds_userdb_g0db0_0
      readDataSourceNames:
        - ds_userdb_g0db0_1
        - ds_userdb_g0db0_2
      loadBalancerName: randomBalancer0
  loadBalancers:
    randomBalancer0:
      type: RANDOM
 - !DB_DISCOVERY
   dataSources:
     pr_userdb_g0db0:
       discoveryTypeName: mgr
       dataSourceNames:
         - ds_userdb_g0db0_0
         - ds_userdb_g0db0_1
         - ds_userdb_g0db0_2
   discoveryTypes:
     mgr:
       type: MGR
       props:
         groupName: 92504d5b-6dec-11e8-91ea-246e9612aaf1
         zkServerLists: 'localhost:2181'
         keepAliveCron: '0/5 * * * * ?'

# see:https://docs.spring.io/spring-boot/docs/2.3.2.RELEASE/actuator-api/html/#overview
# see:org.springframework.boot.actuate.autoconfigure.web.server.ManagementServerProperties
management:
  server:
    address: 0.0.0.0
    port: 10108
    ssl:
      enabled: false
    servlet.contextPath: /
  security:
    enabled: false
    sensitive: true
  metrics:
    export:
      prometheus:
        enabled: true
      jmx:
        enabled: true
  endpoints:
    web:
      basePath: /actuator
      exposure:
        #exclude: /myapi
        include: '*'
    health: # see:org.springframework.boot.actuate.autoconfigure.health.HealthEndpointProperties
      showDetails: always
      mongo.enabled: false
      solr.enabled: false
      db.enabled: true

info:
  app:
    name: "@project.name@"
    description: "@project.description@"
    version: "@project.version@"
    encoding: "@project.build.sourceEncoding@"
    java: "version: @java.version@"

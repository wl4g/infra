spring:
  application.name: test-prometheus-collector
  profiles:
    include: test,metrics-default
  infra:
    metrics:
      counter:
        enabled: true
        expression: execution(public * com.wl4g.infra.metrics.PrometheusCollectorTests.TestController.*(..))
      timed:
        enabled: true
        expression: execution(public * com.wl4g.infra.metrics.PrometheusCollectorTests.TestController.*(..))
      health:
        timed:
          enabled: true

server:
  port: 8080